<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALATTAR Group</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#111;
    color:white;
}

header{
    background:#000;
    padding:20px;
    text-align:center;
}

header h1{
    color:#ffd700;
    font-size:40px;
}

.hero{
    height:80vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.7)),
    url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=1600');
    background-size:cover;
    background-position:center;
}

.hero h2{
    font-size:50px;
    margin-bottom:15px;
}

.hero p{
    font-size:20px;
    margin-bottom:25px;
}

.btn{
    background:#ffd700;
    color:black;
    padding:12px 30px;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
}

.about{
    padding:60px 20px;
    text-align:center;
}

footer{
    background:#000;
    text-align:center;
    padding:20px;
    color:#aaa;
}
</style>
</head>

<body>

<header>
    <h1>ALATTAR Group</h1>
</header>

<section class="hero">
    <h2>Welcome to ALATTAR Group</h2>
    <p>Building Excellence & Innovation</p>
    <a href="#" class="btn">Contact Us</a>
</section>

<section class="about">
    <h2>About Us</h2>
    <br>
    <p>
        ALATTAR Group is dedicated to providing high-quality services,
        innovation, and professional solutions for our clients.
    </p>
</section>

<footer>
    © 2026 ALATTAR Group. All Rights Reserved.
</footer>

</body>
</html>
